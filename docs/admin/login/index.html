</button> <div id="errorBox" class="error" data-astro-cid-rf56lckb></div> </form> </div> </div> <script type="module" src="/_astro/login.astro_astro_type_script_index_0_lang.DKytOmT4.js"></script> <script>(function(){const next = "/admin";

      const form = document.getElementById("adminLoginForm");
      const loginBtn = document.getElementById("loginBtn");
      const errorBox = document.getElementById("errorBox");

      function setError(message) {
        errorBox.textContent = message;
        errorBox.classList.add("show");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.classList.remove("show");
        loginBtn.disabled = true;

        const formData = new FormData(form);
        const email = String(formData.get("email") || "").trim();
        const password = String(formData.get("password") || "");

        try {
          const response = await fetch("/api/admin/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            setError(payload.error || "No fue posible iniciar sesion.");
            loginBtn.disabled = false;
            return;
          }

          window.location.href = next;
        } catch {
          setError("No fue posible conectar con el servidor.");
          loginBtn.disabled = false;
        }
      });
    })();</script> </body> </html>
